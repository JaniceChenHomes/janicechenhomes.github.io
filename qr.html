<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janice Chen | Loading...</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z00FFFVTY4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Z00FFFVTY4');

  // Fire GA4 QR scan event
  gtag('event', 'qr_scan', {
    'event_category': 'QR Code',
    'event_label': 'Postcard 2026',
    'campaign': 'postcard_2026'
  });
</script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js" type="text/javascript"></script>
<script type="text/javascript">
  var EMAILJS_PUBLIC_KEY  = 'X5LCY9uIVvg1EqunE';
  var EMAILJS_SERVICE_ID  = 'service_4cfqawp';
  var EMAILJS_TEMPLATE_ID = 'template_lkj2l8s';

  window.addEventListener('load', function() {
    // Collect scan info
    var scanTime = new Date().toLocaleString('en-US', {
      timeZone: 'America/Los_Angeles',
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true
    });
    var device = /Mobi|Android/i.test(navigator.userAgent) ? '📱 Mobile' : '💻 Desktop';
    var browser = navigator.userAgent.match(/(Chrome|Safari|Firefox|Edge)/)?.[1] || 'Unknown';

    // Send EmailJS notification
    fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id  : EMAILJS_SERVICE_ID,
        template_id : EMAILJS_TEMPLATE_ID,
        user_id     : EMAILJS_PUBLIC_KEY,
        template_params: {
          lead_type    : '📮 Postcard QR Code Scanned!',
          from_name    : 'QR Code Visitor',
          from_email   : 'visitor@janicechenhomes.github.io',
          phone        : 'N/A',
          timeline     : scanTime + ' PST',
          property_info: 'Device: ' + device + ' | Browser: ' + browser + ' | Source: Postcard QR Code'
        }
      })
    })
    .then(function(res) {
      if (res.ok) { console.log('✅ QR scan notification sent'); }
    })
    .catch(function(err) {
      console.error('❌ Error:', err);
    })
    .finally(function() {
      // Redirect after notification attempt
      window.location.replace(
        "https://janicechenhomes.github.io/resources.html?utm_source=qrcode&utm_medium=postcard&utm_campaign=postcard_2026&me=janice"
      );
    });
  });
</script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0A1628;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:'Outfit',sans-serif;
  }
  .loader {
    text-align:center;
    color:white;
  }
  .spinner {
    width:48px; height:48px;
    border:4px solid rgba(201,169,110,0.3);
    border-top-color:#C9A96E;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 1rem;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .name {
    font-size:1.1rem;
    font-weight:600;
    color:#C9A96E;
    margin-bottom:0.3rem;
  }
  .sub {
    font-size:0.8rem;
    color:rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div class="name">Janice Chen</div>
    <div class="sub">Loading your resources...</div>
  </div>
</body>
</html>
